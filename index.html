  <style>
    @font-face {

    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Press Start 2P', monospace; background: #0a0010; color: #f0e6ff; }
    .game-container { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; overflow: hidden; contain: layout style; }
    .game-container::before { content: ''; position: absolute; inset: 0; background: linear-gradient(rgba(191,95,255,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(191,95,255,0.07) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(400px) rotateX(45deg) scaleX(1.5); transform-origin: bottom center; z-index: -1; contain: strict; }
    .game-container::after { content: ''; position: absolute; bottom: 0; left: -20%; right: -20%; height: 50%; background: linear-gradient(to top, rgba(255,45,120,0.08) 0%, transparent 100%); z-index: -1; contain: strict; }
    .hidden { display: none !important; }
    .game-title { font-size: clamp(18px, 5vw, 36px); line-height: 1.5; text-align: center; margin-bottom: 18px; letter-spacing: 4px; color: var(--neon-cyan); text-shadow: var(--shadow-cyan); }
    .edition-badge { font-size: 9px; color: var(--neon-purple); text-shadow: var(--shadow-purple); letter-spacing: 6px; margin-bottom: 28px; }
    .stats-line { font-size: 9px; color: var(--neon-green); text-shadow: 0 0 6px var(--neon-green); margin-bottom: 30px; letter-spacing: 2px; }
    .blink { font-size: 10px; color: var(--neon-pink); text-shadow: var(--shadow-pink); margin-bottom: 28px; }
    
    /* ===== AUTH SYSTEM (Critical CSS) ===== */
    .auth-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .auth-btn { padding: 16px 36px; font-family: inherit; font-size: 14px; background: transparent; color: var(--neon-cyan); border: 2px solid var(--neon-cyan); border-radius: 0; cursor: pointer; text-shadow: var(--shadow-cyan); box-shadow: 0 0 12px rgba(0,245,255,0.5), inset 0 0 12px rgba(0,245,255,0.08); letter-spacing: 3px; transition: all 0.2s; -webkit-clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); min-height: 44px; min-width: 140px; }
    .auth-btn:hover { background: rgba(0,245,255,0.15); box-shadow: 0 0 24px rgba(0,245,255,0.8), inset 0 0 20px rgba(0,245,255,0.2); color: #fff; }
    .register-btn { color: var(--neon-purple); border-color: var(--neon-purple); text-shadow: var(--shadow-purple); box-shadow: 0 0 12px rgba(191,95,255,0.5), inset 0 0 12px rgba(191,95,255,0.08); }
    .register-btn:hover { background: rgba(191,95,255,0.15); box-shadow: 0 0 24px rgba(191,95,255,0.8), inset 0 0 20px rgba(191,95,255,0.2); }
    .hunt-btn.hidden, .auth-buttons.hidden { display: none !important; }
    .auth-modal { z-index: 200; }
    .auth-container { position: relative; width: min(380px, 90%); padding: 32px 24px; background: rgba(10, 0, 20, 0.95); border: 2px solid var(--neon-purple); box-shadow: 0 0 30px rgba(191,95,255,0.4); }
    .auth-form { display: flex; flex-direction: column; gap: 14px; width: 100%; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label { font-size: 9px; color: var(--neon-purple); text-shadow: var(--shadow-purple); letter-spacing: 2px; }
    .auth-field input { padding: 12px 14px; font-family: inherit; font-size: 16px; background: rgba(0,0,0,0.6); border: 1px solid var(--text-dim); color: var(--text-main); outline: none; transition: all 0.2s; min-height: 44px; }
    .auth-field input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0,245,255,0.3); color: var(--neon-cyan); }
    .auth-error { font-size: 9px; color: var(--neon-pink); text-shadow: var(--shadow-pink); min-height: 18px; text-align: center; }
    .auth-submit { margin-top: 8px; padding: 14px 32px; font-family: inherit; font-size: 12px; background: transparent; color: var(--neon-green); border: 2px solid var(--neon-green); cursor: pointer; letter-spacing: 3px; text-shadow: 0 0 8px var(--neon-green); box-shadow: 0 0 12px rgba(57,255,20,0.4); transition: all 0.2s; min-height: 44px; }
    .auth-submit:hover { background: rgba(57,255,20,0.15); box-shadow: 0 0 24px rgba(57,255,20,0.7); }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-toggle { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 9px; color: var(--text-dim); }
    .auth-toggle-btn { background: transparent; border: none; color: var(--neon-cyan); font-family: inherit; font-size: 9px; cursor: pointer; text-decoration: underline; padding: 4px; min-height: 44px; }
    .auth-toggle-btn:hover { color: var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); }
    .auth-close { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim); font-family: inherit; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .auth-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); }
    .ios-notification { position: fixed; top: 0; left: 50%; transform: translateX(-50%) translateY(-100%); background: rgba(30, 30, 30, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 14px 24px; border-radius: 0 0 20px 20px; display: flex; align-items: center; gap: 12px; z-index: 10000; box-shadow: 0 4px 24px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-top: none; min-width: 280px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .ios-notification.show { transform: translateX(-50%) translateY(0); }
    .notification-icon { font-size: 20px; }
    .notification-text { font-size: 12px; color: #fff; letter-spacing: 1px; }
    .user-info { position: absolute; top: 14px; right: 14px; display: flex; align-items: center; gap: 10px; font-size: 9px; color: var(--neon-cyan); }
    .user-info button { background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); font-family: inherit; font-size: 8px; padding: 6px 12px; cursor: pointer; min-height: 32px; }
    .user-info button:hover { background: rgba(255,45,120,0.15); box-shadow: 0 0 12px rgba(255,45,120,0.5); }
    @media (max-width: 480px) { .auth-container { padding: 24px 16px; } .auth-btn { padding: 14px 28px; font-size: 12px; } }
  </style>

<body>

            <span class="theme-dot midnight" aria-hidden="true"></span>MID
          </button>
          <button class="theme-btn" role="button" data-theme="matrix" onclick="setTheme('matrix')" title="Matrix" aria-label="Matrix theme">
            <span class="theme-dot matrix" aria-hidden="true"></span>MTX

          <button class="theme-btn" role="button" data-theme="3310" onclick="setTheme('3310')" title="3310" aria-label="3310 Nokia theme">
            <span class="theme-dot t3310" aria-hidden="true"></span>3310

          <button class="theme-btn" role="button" data-theme="sunset" onclick="setTheme('sunset')" title="Sunset" aria-label="Sunset theme">

      <!-- Reset progress -->

      </div>
    </div>
  </div>
  <!-- ── CATEGORY SCREEN ────────────────────── -->
  <div id="category-screen" class="game-container hidden" role="region" aria-label="Category selection">
    <button class="back-btn" role="button" onclick="goBack()">◀ BACK</button>
    <h2 class="screen-title">// SELECT CATEGORY //</h2>
    <div id="category-list" class="category-grid" role="list"></div>
  </div>
  <!-- ── GAME SCREEN ────────────────────────── -->
  <div id="game-screen" class="game-container hidden" role="region" aria-label="Game">
    <header>
      <div class="stat">CAT:&nbsp;<span id="category">ALL</span></div>
      <div class="header-actions">
        <div class="stat header-xp">XP:&nbsp;<span id="xp" aria-live="polite">0</span></div>
        <button class="icon-btn exit-icon-btn" role="button" onclick="exitGame()" title="Exit to menu" aria-label="Exit to menu">✕</button>
      </div>

    <div id="quiz-box">

  <!-- ── AUTH MODAL ─────────────────────────── -->
  <div id="auth-modal" class="modal auth-modal hidden" role="dialog" aria-modal="true" aria-label="Authentication">
    <div class="auth-container">
      <h2 class="modal-title" id="auth-title">// LOGIN //</h2>
      
      <form id="auth-form" class="auth-form" onsubmit="return false;">
        <div class="auth-field" id="username-field" style="display:none;">
          <label>USERNAME</label>
          <input type="text" id="auth-username" placeholder="Enter username" autocomplete="username">
        </div>
        
        <div class="auth-field">
          <label>EMAIL</label>
          <input type="email" id="auth-email" placeholder="Enter email" autocomplete="email" required>
        </div>
        
        <div class="auth-field">
          <label>PASSWORD</label>
          <input type="password" id="auth-password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        
        <div id="auth-error" class="auth-error"></div>
        
        <button type="button" class="auth-submit" id="auth-submit" onclick="handleAuthSubmit()">ENTER</button>
      </form>
      
      <div class="auth-toggle">
        <span id="auth-toggle-text">Need an account?</span>
        <button type="button" class="auth-toggle-btn" onclick="toggleAuthMode()">REGISTER</button>
      </div>
      
      <button class="auth-close" onclick="closeAuthModal()">✕</button>
    </div>

<!-- Firebase Initialization -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  
  const firebaseConfig = {
    apiKey: "AIzaSyCgKKrHIaDNzjUIaK2Z-Usf587px-lPMSY",
    authDomain: "pixelwordhunter.firebaseapp.com",
    databaseURL: "https://pixelwordhunter-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pixelwordhunter",
    storageBucket: "pixelwordhunter.firebasestorage.app",
    messagingSenderId: "1094897769595",
    appId: "1:1094897769595:web:392a30ef42f3b558b896de",
    measurementId: "G-X90YSQL16F"

  const app = initializeApp(firebaseConfig);
  window.firebaseAuth = getAuth(app);

  <!-- Auth Logic -->
  <script type="module">
    import { 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      updateProfile,
      onAuthStateChanged,
      signOut 
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { 
      doc, 
      setDoc, 
      getDoc 
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    const authState = {
      currentUser: null,
      isAuthenticated: false,
      mode: 'login'
    };
    window.showAuthModal = function(mode = 'login') {
      authState.mode = mode;
      document.getElementById('auth-title').textContent = mode === 'login' ? '// LOGIN //' : '// REGISTER //';
      document.getElementById('username-field').style.display = mode === 'register' ? 'flex' : 'none';
      document.getElementById('auth-toggle-text').textContent = mode === 'login' ? 'Need an account?' : 'Have an account?';
      document.querySelector('.auth-toggle-btn').textContent = mode === 'login' ? 'REGISTER' : 'LOGIN';
      document.getElementById('auth-error').textContent = '';
      document.getElementById('auth-form').reset();
      document.getElementById('auth-modal').classList.remove('hidden');
    };
    window.closeAuthModal = function() {
      document.getElementById('auth-modal').classList.add('hidden');
    };
    window.toggleAuthMode = function() {
      window.showAuthModal(authState.mode === 'login' ? 'register' : 'login');
    };
    window.showIOSNotification = function(message, duration = 3000) {
      const el = document.getElementById('ios-notification');
      document.getElementById('notification-text').textContent = message;
      el.classList.remove('hidden');
      requestAnimationFrame(() => el.classList.add('show'));
      setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => el.classList.add('hidden'), 400);
      }, duration);
    };
    function updateAuthUI() {
      const authButtons = document.getElementById('auth-buttons');
      const huntBtn = document.getElementById('hunt-btn');
      const menuScreen = document.getElementById('menu-screen');
      
      const oldInfo = menuScreen.querySelector('.user-info');
      if (oldInfo) oldInfo.remove();
      
      if (authState.isAuthenticated && authState.currentUser) {
        authButtons?.classList.add('hidden');
        huntBtn?.classList.remove('hidden');
        
        const info = document.createElement('div');
        info.className = 'user-info';
        info.innerHTML = `
          <span>${authState.currentUser.displayName || authState.currentUser.email.split('@')[0]}</span>
          <button onclick="handleLogout()">LOGOUT</button>
        `;
        menuScreen.insertBefore(info, menuScreen.querySelector('.credits'));
      } else {
        authButtons?.classList.remove('hidden');
        huntBtn?.classList.add('hidden');
      }
    }
    window.handleLogout = async function() {
      try {
        await signOut(window.firebaseAuth);
        authState.currentUser = null;
        authState.isAuthenticated = false;
        updateAuthUI();
        window.showIOSNotification('Logged out successfully');
      } catch (e) {
        console.error('Logout error:', e);
      }
    };
    window.handleAuthSubmit = async function() {
      const btn = document.getElementById('auth-submit');
      const errorEl = document.getElementById('auth-error');
      
      btn.disabled = true;
      errorEl.textContent = '';
      
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      
      try {
        if (authState.mode === 'register') {
          const username = document.getElementById('auth-username').value;
          if (!username) {
            errorEl.textContent = 'Username required';
            btn.disabled = false;
            return;
          }
          
          const { user } = await createUserWithEmailAndPassword(window.firebaseAuth, email, password);
          await updateProfile(user, { displayName: username });
          
          await setDoc(doc(window.firebaseDb, 'users', user.uid), {
            username,
            email,
            xp: 0,
            level: 1,
            category: 'Novice',
            createdAt: new Date(),
            stats: { wordsFound: 0, gamesPlayed: 0 }
          });
        } else {
          await signInWithEmailAndPassword(window.firebaseAuth, email, password);
        }
        
        window.closeAuthModal();
      } catch (error) {
        console.error('Firebase Error:', error.code, error.message);
        const errors = {
          'auth/email-already-in-use': 'Email already registered',
          'auth/invalid-email': 'Invalid email',
          'auth/weak-password': 'Password min 6 chars',
          'auth/user-not-found': 'User not found',
          'auth/wrong-password': 'Wrong password',
          'auth/invalid-credential': 'Invalid email or password'
        };
        errorEl.textContent = errors[error.code] || 'Auth failed: ' + error.code;
      }
      
      btn.disabled = false;
    };
    // Auth State Listener
    onAuthStateChanged(window.firebaseAuth, async (user) => {
      if (user) {
        authState.currentUser = user;
        authState.isAuthenticated = true;
        
        // Load progress from Firestore
        try {
          window.state.xp = 0;
          const docSnap = await getDoc(doc(window.firebaseDb, 'users', user.uid));
          if (docSnap.exists() && window.state) {
            const data = docSnap.data();
            if (data.xp !== undefined) window.state.xp = data.xp || 0;
          }
        } catch (e) { console.error('Load error:', e); }
        
        const name = user.displayName || user.email.split('@')[0];
        window.showIOSNotification(`Welcome, ${name}!`);
      } else {
        authState.currentUser = null;
        authState.isAuthenticated = false;
      }
      updateAuthUI();
    });
  </script>
